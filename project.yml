name: PeekBoard
options:
  bundleIdPrefix: com.peekboard
  deploymentTarget:
    macOS: "13.0"
targets:
  PeekBoard:
    type: application
    platform: macOS
    settings:
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
    info:
      path: PeekBoard/Info.plist
    sources:
      - path: PeekBoard
    dependencies:
      - package: GRDB
      - package: HotKey
  PeekBoardTests:
    type: bundle.unit-test
    platform: macOS
    settings:
      CODE_SIGN_IDENTITY: "-"
      CODE_SIGN_STYLE: Automatic
    sources:
      - path: PeekBoardTests
    dependencies:
      - target: PeekBoard
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.27.0
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: 0.2.0
